---
apiVersion: v1
kind: Namespace
metadata:
  name: autoscale
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-server
  namespace: autoscale
  labels:
    app: apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - name: nginx
        image: httpd
        ports:
        - containerPort: 80