apiVersion: v1
kind: Namespace
metadata:
  name: sound-repeater
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-echo-config
  namespace: sound-repeater
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        location /echo {
            default_type text/plain;
            return 200 "Hello from /echo path!";
        }
        location / {
            return 404 "Not found";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echoserver
  namespace: sound-repeater
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echoserver
  template:
    metadata:
      labels:
        app: echoserver
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: config
        configMap:
          name: nginx-echo-config
---
apiVersion: v1
kind: Service
metadata:
  name: echoserver-service
  namespace: sound-repeater
spec:
  selector:
    app: echoserver
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
